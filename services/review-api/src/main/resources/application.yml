spring:
  application:
    name: review-api

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] requestId=%X{requestId:-} %logger{36} - %msg%n"

rag:
  python:
    command:
      - python
      - -m
      - app.api_runner
    working-directory: ../../rag-engine-python
    timeout: 10s
  http:
    base-url: ${PYTHON_ENGINE_BASE_URL:http://localhost:8000}